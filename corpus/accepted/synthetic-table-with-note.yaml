id: synthetic-table-with-note
gate: tables-v1
sourceType: digital
expectedMode: pdf-text
gating: true
must:
  - detect_visible_table
  - preserve_table_cells
  - preserve_table_note
mustNot:
  - invent_missing_values
  - emit_binary_garbage
  - fold_note_into_table
  - drop_table_note
metrics:
  minTextCoverage: 1
  minTableCellAdjacency: 1
  minTableCsvCellTextAccuracy: 1
  minTableSpanAccuracy: 1
  maxUnexpectedWarnings: 0
snippets:
  - page: 1
    contains: "Region"
  - page: 1
    contains: "Note: Values are rounded to the nearest whole user."
structure:
  expected:
    - gfm_table
    - table_note
    - three_columns
    - three_rows
warnings:
  allowed: []
assets:
  required: []
review:
  humanReviewedBy: "codex"
  reviewedAt: "2026-07-02"
  notes: "The note is close to the ruled grid but outside its borders; acceptance requires preserving it as prose after the table."
