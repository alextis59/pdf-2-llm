id: synthetic-borderless-table
gate: tables-v1
sourceType: digital
expectedMode: pdf-text
gating: true
must:
  - detect_borderless_table
  - preserve_column_alignment
mustNot:
  - invent_missing_values
  - emit_binary_garbage
  - merge_adjacent_columns
metrics:
  minTextCoverage: 1
  minTableCellAdjacency: 1
  minTableSpanAccuracy: 1
  maxUnexpectedWarnings: 0
snippets:
  - page: 1
    contains: "Item"
  - page: 1
    contains: "Notebook"
structure:
  expected:
    - borderless_table
    - aligned_numeric_columns
warnings:
  allowed: []
assets:
  required: []
review:
  humanReviewedBy: "codex"
  reviewedAt: "2026-07-02"
  notes: "Columns are aligned without ruling lines to test whitespace inference."
