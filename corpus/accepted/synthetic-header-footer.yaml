id: synthetic-header-footer
gate: layout-v1
sourceType: digital
expectedMode: pdf-text
gating: true
must:
  - detect_repeated_header
  - detect_repeated_footer
  - preserve_body_text
mustNot:
  - invent_missing_values
  - emit_binary_garbage
  - repeat_running_header_in_body
metrics:
  minTextCoverage: 1
  minRunningContentPrecision: 1
  minRunningContentRecall: 1
  maxUnexpectedWarnings: 0
snippets:
  - page: 1
    contains: "First page body."
  - page: 2
    contains: "Second page body."
runningContent:
  expectedRemoved:
    - "Running Header"
    - "Page Footer"
  expectedRetained:
    - "Header Footer Fixture"
    - "First page body."
    - "Second page body."
structure:
  expected:
    - multi_page
    - header_footer_removal
warnings:
  allowed: []
assets:
  required: []
review:
  humanReviewedBy: "codex"
  reviewedAt: "2026-07-02"
  notes: "Header and footer repeat across both pages and should be removable."
