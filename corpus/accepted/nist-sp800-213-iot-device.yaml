id: nist-sp800-213-iot-device
gate: layout-v1
sourceType: digital
expectedMode: pdf-text
gating: true
must:
  - extract_title
  - preserve_nist_publication_identifier
  - preserve_tagged_pdf_signal
  - preserve_section_headings
  - preserve_lists
  - preserve_references
mustNot:
  - invent_missing_values
  - emit_binary_garbage
  - drop_title_page_metadata
  - flatten_all_sections_into_one_paragraph
metrics:
  minTextCoverage: 0.95
  maxUnexpectedWarnings: 3
snippets:
  - page: 1
    contains: "NIST Special Publication 800-213"
  - page: 1
    contains: "IoT Device Cybersecurity Guidance for the Federal Government"
  - page: 3
    contains: "This publication may be used by nongovernmental organizations on a voluntary basis and is not subject to copyright in the United States."
structure:
  expected:
    - tagged_pdf
    - title_page
    - section_headings
    - lists
    - references
warnings:
  allowed:
    - repeated_running_content
assets:
  required: []
review:
  humanReviewedBy: "codex"
  reviewedAt: "2026-07-02"
  notes: "Accepted from NIST source URL after pdfinfo confirmed tagged, unencrypted PDF 1.6 with 47 pages; snippets were checked with pdftotext."
