id: synthetic-complex-spanned-table
gate: tables-v1
sourceType: digital
expectedMode: pdf-text
gating: true
must:
  - detect_visible_table
  - detect_cell_span
  - emit_html_table
  - emit_csv_sidecar
mustNot:
  - invent_missing_values
  - emit_binary_garbage
  - emit_broken_gfm_for_spans
  - drop_spanned_header
metrics:
  minTextCoverage: 1
  minTableCsvCellTextAccuracy: 1
  minTableSpanAccuracy: 1
  maxUnexpectedWarnings: 0
snippets:
  - page: 1
    contains: "Revenue &lt;Total&gt;"
  - page: 1
    contains: '100 &quot;net&quot;'
structure:
  expected:
    - html_table
    - column_span
    - csv_sidecar
warnings:
  allowed: []
assets:
  required: []
review:
  humanReviewedBy: "codex"
  reviewedAt: "2026-07-02"
  notes: "The missing vertical rule in the header creates a colspan; Markdown cannot represent the span, so acceptance requires HTML table output plus CSV cell text coverage."
