id: synthetic-hyphenated-line
gate: text-mvp
sourceType: digital
expectedMode: pdf-text
gating: true
must:
  - repair_line_end_hyphenation
  - preserve_paragraph_order
mustNot:
  - invent_missing_values
  - emit_binary_garbage
  - keep_unrepaired_line_end_hyphen
metrics:
  minTextCoverage: 1
  maxCharacterErrorRate: 0
  maxUnexpectedWarnings: 0
snippets:
  - page: 1
    contains: "Hyphenation Fixture"
  - page: 1
    contains: "hyphenation repair"
structure:
  expected:
    - heading_level_1
    - paragraphs
    - hyphenation_repair
warnings:
  allowed: []
assets:
  required: []
review:
  humanReviewedBy: "codex"
  reviewedAt: "2026-07-02"
  notes: "Exact-output generated fixture with one line-end split word; maxCharacterErrorRate is zero because expected Markdown is the reviewed oracle and the hyphenation repair should produce hyphenation."
