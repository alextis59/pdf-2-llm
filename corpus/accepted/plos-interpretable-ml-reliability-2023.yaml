id: plos-interpretable-ml-reliability-2023
gate: layout-v1
sourceType: digital
expectedMode: pdf-text
gating: true
must:
  - extract_title
  - preserve_body_text
  - preserve_caption
  - preserve_references
mustNot:
  - invent_missing_values
  - emit_binary_garbage
  - emit_empty_markdown
  - flatten_all_sections_into_one_paragraph
metrics:
  minTextCoverage: 0.75
  maxUnexpectedWarnings: 0
snippets:
  - page: 1
    contains: "Enabling interpretable machine learning"
  - page: 1
    contains: "Machine learning tools have proven useful across biological disciplines"
  - page: 1
    contains: "SWIF(r) reliability score"
  - page: 21
    contains: "References"
structure:
  expected:
    - scientific_paper
    - two_column_layout
    - abstract
    - figures
    - references
warnings:
  allowed:
    - text.ordering_uncertain
    - figure.low_semantic_content
assets:
  required: []
review:
  humanReviewedBy: "codex"
  reviewedAt: "2026-07-08"
  notes: "Accepted from the PLOS source URL after pdfinfo confirmed an unencrypted, untagged 24-page PDF 1.6. The 0.75 text-coverage floor accounts for two-column sidebars and figure assets while snippets lock the title, abstract, domain term, and references."
