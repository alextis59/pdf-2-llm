id: synthetic-rtl-text
gate: advanced-v1
sourceType: digital
expectedMode: pdf-text
gating: true
must:
  - extract_rtl_text
  - preserve_rtl_reading_order
  - emit_bidi_markup
mustNot:
  - invent_missing_values
  - emit_binary_garbage
  - drop_bidi_markup
  - reverse_rtl_fragments
metrics:
  minTextCoverage: 1
  maxUnexpectedWarnings: 0
snippets:
  - page: 1
    contains: "Synthetic RTL Text"
  - page: 1
    contains: "אבג"
structure:
  expected:
    - heading_level_1
    - rtl_paragraph
    - bidi_markup
warnings:
  allowed: []
assets:
  required: []
review:
  humanReviewedBy: "codex"
  reviewedAt: "2026-07-10"
  notes: "Reviewed ToUnicode fixture requires exact RTL row ordering and dir=rtl output; embedded vector glyphs keep the Hebrew target visible in rendered previews."
