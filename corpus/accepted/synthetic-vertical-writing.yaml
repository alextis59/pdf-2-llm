id: synthetic-vertical-writing
gate: advanced-v1
sourceType: digital
expectedMode: pdf-text
gating: true
must:
  - extract_vertical_text
  - preserve_vertical_column_order
  - emit_vertical_writing_markup
mustNot:
  - invent_missing_values
  - emit_binary_garbage
  - flatten_vertical_columns
  - drop_vertical_writing_markup
metrics:
  minTextCoverage: 1
  maxUnexpectedWarnings: 0
snippets:
  - page: 1
    contains: "縦"
  - page: 1
    contains: "列"
structure:
  expected:
    - vertical_writing
    - vertical_rl_markup
warnings:
  allowed: []
assets:
  required: []
review:
  humanReviewedBy: "codex"
  reviewedAt: "2026-07-10"
  notes: "Reviewed ToUnicode fixture requires right-to-left vertical column order and writing-mode markup; embedded vector glyphs keep both columns visible in rendered previews."
