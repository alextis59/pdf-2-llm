id: nist-sp800-218-secure-software
gate: layout-v1
sourceType: digital
expectedMode: pdf-text
gating: true
must:
  - extract_title
  - preserve_nist_publication_identifier
  - preserve_tagged_pdf_signal
  - preserve_section_headings
  - preserve_tables
  - preserve_references
mustNot:
  - invent_missing_values
  - emit_binary_garbage
  - drop_title_page_metadata
  - flatten_all_sections_into_one_paragraph
metrics:
  minTextCoverage: 0.95
  minRunningContentPrecision: 1
  minRunningContentRecall: 1
  minTaggedMarkedContent: 1
  maxTaggedStructureConflicts: 0
  maxUnexpectedWarnings: 0
snippets:
  - page: 1
    contains: "NIST Special Publication 800-218"
  - page: 1
    contains: "Framework (SSDF) Version 1.1:"
  - page: 3
    contains: "This publication may be used by nongovernmental organizations on a voluntary basis and is not subject to copyright in the United States."
runningContent:
  expectedRemoved:
    - "NIST SP 800-218"
    - "This publication is available free of charge from: https://doi.org/10.6028/NIST.SP.800-218"
  expectedRetained:
    - "Secure Software Development Framework (SSDF) Version 1.1"
    - "The Secure Software Development Framework"
structure:
  expected:
    - tagged_pdf
    - title_page
    - section_headings
    - tables
    - references
warnings:
  allowed:
    - text.ordering_uncertain
    - table.low_confidence
assets:
  required: []
review:
  humanReviewedBy: "codex"
  reviewedAt: "2026-07-02"
  notes: "Accepted from NIST source URL after pdfinfo confirmed tagged, unencrypted PDF 1.6 with 36 pages; snippets were checked with pdftotext."
