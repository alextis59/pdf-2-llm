name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install dependencies
        run: npm ci

      - name: Run Rust tests
        run: npm run ci:rust:test

      - name: Run lint
        run: npm run ci:lint

      - name: Build package and WASM
        run: npm run ci:build

      - name: Run TypeScript package tests
        run: npm run ci:typescript:test

      - name: Run corpus smoke tests
        run: npm run ci:corpus:smoke

      - name: Run full quality gates
        run: npm run check

      - name: Upload QA reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-reports
          path: |
            .temp/qa
            .temp/layout-overlays
            corpus/reports
          if-no-files-found: warn
